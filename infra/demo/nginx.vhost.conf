# Demo deployment nginx vhost template.
#
# Replace __DEMO_HOST__ with your actual hostname before installing:
#   sed -i 's/__DEMO_HOST__/your-demo-host.example.com/' nginx.vhost.conf
#   sudo cp nginx.vhost.conf /etc/nginx/sites-available/your-demo-host
#   sudo ln -s ../sites-available/your-demo-host /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d your-demo-host
#
# certbot rewrites the listen lines to add `ssl` + cert paths and inserts
# the HTTP→HTTPS redirect block automatically. Keep this template as the
# pre-certbot starting point so re-issuing is reproducible.

upstream seta_server {
    server 127.0.0.1:13000;
    keepalive 16;
}

upstream seta_web {
    server 127.0.0.1:18080;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name __DEMO_HOST__;

    client_max_body_size 100M;

    # SSE / streaming chat from the copilot — keep the connection open and
    # don't buffer chunks.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $http_connection;

    location /api/ {
        proxy_pass http://seta_server;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /health/ {
        proxy_pass http://seta_server;
        access_log off;
    }

    location / {
        proxy_pass http://seta_web;
    }
}

# Map for the websocket/sse Connection header upgrade.
# Place this in /etc/nginx/conf.d/ws-upgrade.conf if not already present:
#
#   map $http_upgrade $http_connection {
#       default upgrade;
#       ''      close;
#   }
