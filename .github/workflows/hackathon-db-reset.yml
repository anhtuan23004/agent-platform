name: Hackathon — DB Reset & Seed

on:
  workflow_dispatch:
    inputs:
      tenant:
        description: 'Tenant slug (default: hackathon)'
        required: false
        default: 'hackathon'
      tenant_name:
        description: 'Tenant display name (defaults to slug)'
        required: false
        default: ''
      admin_email:
        description: 'Admin email'
        required: false
        default: 'admin@hackathon.com'
      password:
        description: 'Default password for seeded users'
        required: false
        default: 'ChangeMe@2026'
      only:
        description: 'Comma-separated phases to run: users,planner,availability,pmo (default: all)'
        required: false
        default: ''
      seed_pmo:
        description: 'Build + upload PMO_02 mock-data.db (demo only; not baked in server image)'
        required: false
        default: 'true'

concurrency:
  group: hackathon-db-seed
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  db-seed:
    name: Reset DB & seed demo data → ${{ github.event.inputs.tenant }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v4.2.0
        with:
          version: 10

      - uses: actions/setup-node@v6.1.0
        with:
          node-version: 24
          cache: pnpm

      - name: Build PMO_02 mock-data.db (CI only — not in production image)
        if: ${{ github.event.inputs.seed_pmo == 'true' }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sqlite3
          pnpm install --frozen-lockfile
          node --experimental-strip-types packages/pmo/scripts/insert-mock.ts
          ls -lh mock-data.db

      - name: Upload PMO mock DB to EC2
        if: ${{ github.event.inputs.seed_pmo == 'true' }}
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: mock-data.db
          target: /opt/seta/demo-assets
          strip_components: 0

      - name: SSH reset DB and seed
        uses: appleboy/ssh-action@v1.2.5
        env:
          TENANT: ${{ github.event.inputs.tenant }}
          TENANT_NAME: ${{ github.event.inputs.tenant_name }}
          ADMIN_EMAIL: ${{ github.event.inputs.admin_email }}
          SEED_PASSWORD: ${{ github.event.inputs.password }}
          ONLY: ${{ github.event.inputs.only }}
          SEED_PMO: ${{ github.event.inputs.seed_pmo }}
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: TENANT,TENANT_NAME,ADMIN_EMAIL,SEED_PASSWORD,ONLY,SEED_PMO
          script: |
            set -euo pipefail
            echo "=== Resetting DB and seeding tenant: $TENANT ==="

            ARGS="--tenant $TENANT --admin-email $ADMIN_EMAIL --password $SEED_PASSWORD"
            [ -n "$TENANT_NAME" ] && ARGS="$ARGS --tenant-name $TENANT_NAME"
            [ -n "$ONLY" ]        && ARGS="$ARGS --only $ONLY"

            cd /opt/platform

            echo "--- Stopping stack and wiping volumes ---"
            docker compose --env-file /opt/seta/.env down -v

            echo "--- Starting postgres ---"
            docker compose --env-file /opt/seta/.env up -d postgres

            echo "--- Running migrations ---"
            docker compose --env-file /opt/seta/.env run --rm migrator

            PMO_ARGS=""
            if [ "$SEED_PMO" = "true" ] && [ -f /opt/seta/demo-assets/mock-data.db ]; then
              echo "--- PMO_02: mounting demo mock-data.db (read-only) ---"
              PMO_ARGS="-v /opt/seta/demo-assets/mock-data.db:/app/apps/cli/mock-data.db:ro"
              PMO_ARGS="$PMO_ARGS -e PMO_MOCK_DB_PATH=/app/apps/cli/mock-data.db"
            elif echo "$ARGS $ONLY" | grep -q pmo || [ -z "$ONLY" ]; then
              echo "WARNING: pmo seed requested but /opt/seta/demo-assets/mock-data.db missing; pmo phase may fail"
            fi

            echo "--- Seeding data ---"
            docker compose --env-file /opt/seta/.env run --rm \
              $PMO_ARGS \
              -e DATABASE_URL \
              seeder seed $ARGS

            echo "--- Bringing stack back up ---"
            docker compose --env-file /opt/seta/.env up -d

            echo "=== Reset and seed complete ==="
